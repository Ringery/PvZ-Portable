name: Deploy Web Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Emscripten (WASM Compiler)
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Install System Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libogg-dev libjpeg-dev libpng-dev libvorbis-dev libmpg123-dev

      - name: Compile C++ to WebAssembly
        run: |
          cmake -G Ninja -B build -DCMAKE_TOOLCHAIN_FILE=$EMSDK/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Upload Website Files to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/wasm
